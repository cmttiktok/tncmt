<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Comments - Chi Bánh Bèo</title>
    <!-- Nhúng thư viện Socket.IO Client -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20, #15102a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Bố cục giao diện 1 cột thẳng, tối ưu dọc theo màn hình điện thoại */
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header phong cách Glassmorphism */
        .header-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .header-panel h1 {
            font-size: 1.4rem;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            margin-bottom: 5px;
        }

        .status-badge {
            display: inline-block;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        /* Khung chứa bình luận 1 cột dọc kéo dài xuống */
        .comment-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            height: calc(100vh - 120px); /* Tự động co giãn theo chiều cao màn hình */
            min-height: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .comment-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Tùy chỉnh thanh cuộn cho gọn gàng */
        .comment-list::-webkit-scrollbar {
            width: 4px;
        }
        .comment-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Giao diện từng dòng tin nhắn comment */
        .comment-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff007f;
            padding: 10px 14px;
            border-radius: 4px 12px 12px 4px;
            animation: fadeIn 0.3s ease forwards;
            word-wrap: break-word;
        }

        .comment-user {
            font-size: 0.9rem;
            margin-bottom: 3px;
        }

        .nickname {
            color: #00d2d3;
            font-weight: 600;
        }

        .username {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-left: 4px;
        }

        .comment-text {
            color: #f5f6fa;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Khu vực hiển thị tiêu đề và trạng thái -->
        <div class="header-panel">
            <h1>ROOM CHI BÁNH BÈO</h1>
            <div id="status" class="status-badge">Đang kết nối server...</div>
        </div>

        <!-- Vùng hiển thị danh sách dòng chat đơn cột -->
        <div class="comment-box">
            <div id="comment-list" class="comment-list">
                <!-- Tin nhắn mẫu ban đầu khi đợi luồng dữ liệu -->
                <div class="comment-item" style="border-left-color: #2ed573;">
                    <div class="comment-user">
                        <span class="nickname">Hệ thống</span>
                    </div>
                    <div class="comment-text">Đang đợi bình luận mới từ livestream @chipham1...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình IP VPS chạy Node.js của bạn
        const VPS_IP = "http://34.126.191.224:3001"; 
        
        const socket = io(VPS_IP);
        const statusBadge = document.getElementById('status');
        const commentList = document.getElementById('comment-list');

        // Lắng nghe trạng thái kết nối socket
        socket.on('connect', () => {
            statusBadge.innerText = "● Đã kết nối dữ liệu";
            statusBadge.classList.add('connected');
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = "Mất kết nối server";
            statusBadge.classList.remove('connected');
        });

        // Nhận event 'new_comment' từ VPS đẩy về
        socket.on('new_comment', (data) => {
            const commentItem = document.createElement('div');
            commentItem.className = 'comment-item';

            // Xử lý giới hạn emoji (nếu có chuỗi chat quá dài hoặc spam, bạn có thể custom thêm)
            commentItem.innerHTML = `
                <div class="comment-user">
                    <span class="nickname">${data.nickname}</span>
                    <span class="username">@${data.username}</span>
                </div>
                <div class="comment-text">${data.comment}</div>
            `;

            // Append vào danh sách hiển thị
            commentList.appendChild(commentItem);

            // Tự động cuộn xuống dưới cùng để bám theo luồng chat mới nhất
            commentList.scrollTop = commentList.scrollHeight;

            // Giới hạn màn hình điện thoại chỉ chứa tối đa 40 dòng chat để tránh tràn ram/lag trình duyệt
            const currentItems = commentList.getElementsByClassName('comment-item');
            if (currentItems.length > 40) {
                currentItems[0].remove();
            }
        });
    </script>
</body>
</html>
