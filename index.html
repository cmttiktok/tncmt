<!-- Bỏ đoạn .header-panel cũ đi và thay bằng đoạn này -->
<div class="header-panel">
    <h1>🌸 BÈO LIVE COMMENTS</h1>
    <div class="realtime-clock" id="liveTime">Đang tải...</div>
    <!-- Thanh trạng thái mới to rực rỡ để báo lỗi -->
    <div id="connectionStatus" style="margin-top: 8px; padding: 4px; border-radius: 8px; font-size: 12px; font-weight: bold; background: #ffe5ec; color: #ff4a7d;">
        🔄 Đang kết nối máy chủ Render...
    </div>
</div>

<script>
    // Tìm đến đoạn cuối file script, bổ sung các logic kiểm soát socket sau:
    const statusEl = document.getElementById('connectionStatus');

    socket.on('connect', () => {
        statusEl.innerText = "🟢 Hệ thống Ổn Định - Sẵn sàng nhận bình luận";
        statusEl.style.background = "#d4edda";
        statusEl.style.color = "#155724";
    });

    socket.on('disconnect', () => {
        statusEl.innerText = "🔴 Mất kết nối tới Render! Đang thử lại...";
        statusEl.style.background = "#f8d7da";
        statusEl.style.color = "#721c24";
    });
    
    // Giữ nguyên đoạn socket.on('new-comment', ...) phía dưới của bạn
</script>
