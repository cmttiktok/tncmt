<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÈO LIVE COMMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <!-- Nhúng thư viện Socket.IO Client từ CDN ổn định -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --pink: #fe2c55; 
            --bg: #fff0f3; 
            --panel: #ffffff; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Widget Đồng hồ */
        .clock-card {
            background: linear-gradient(135deg, var(--pink), #ff6b8b);
            color: white; padding: 12px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(254,44,85,0.2);
        }
        #digitalClock { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        #digitalDate { font-size: 13px; opacity: 0.9; margin-top: 2px; }

        .card { 
            background: var(--panel); padding: 15px; border-radius: 20px; 
            border: 2px solid var(--pink); box-shadow: 0 6px 20px rgba(254,44,85,0.08);
            text-align: center;
        }
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; background: #f8f9fa;
            font-family: inherit; font-size: 16px; text-align: center; margin-bottom: 12px;
            outline: none; transition: 0.2s;
        }
        /* Style khi ô nhập bị khóa lúc đang chạy */
        input[type="text"]:disabled {
            background: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }
        
        .btn-main {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--pink); color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
            text-transform: uppercase;
        }
        .btn-main:active { transform: scale(0.98); }
        
        /* Trạng thái nút bấm khi chuyển sang nút Ngắt kết nối */
        .btn-stop-mode {
            background: #333333 !important;
        }

        .status-text { font-size: 13px; color: #ffa502; margin-top: 8px; display: block; font-weight: 600; }
        
        /* Thanh điều khiển cỡ chữ */
        .font-control {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; margin-bottom: 12px; background: #fff5f7;
            padding: 8px 12px; border-radius: 10px; border: 1px dashed var(--pink);
        }
        .font-control label { font-size: 13px; color: #555; font-weight: bold; white-space: nowrap; }
        .font-control input[type="range"] { 
            flex: 1; accent-color: var(--pink); cursor: pointer; height: 6px; 
        }
        
        /* Tiêu đề khung chat và nút kích hoạt toàn màn hình */
        .chat-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .chat-title { margin: 0; color: var(--pink); font-size: 15px; }
        .btn-action {
            background: #333; color: white; border: none; padding: 6px 12px;
            font-size: 12px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
        .btn-close-full {
            background: #fe2c55; color: white; border: none; padding: 8px 16px;
            font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; display: none;
        }
        
        /* Khung chatbox mượt mà */
        .chat-box-wrapper {
            position: relative; width: 100%;
        }
        .chat-box {
            width: 100%; height: calc(100vh - 340px); min-height: 350px; max-height: 550px;
            background: #fff; border-radius: 15px; border: 1px solid #eee;
            padding: 12px; overflow-y: auto; text-align: left;
            display: flex; flex-direction: column; gap: 8px; transition: all 0.2s ease-in-out;
        }
        .msg { font-size: 16px; line-height: 1.4; animation: fadeIn 0.2s ease; word-break: break-word; }
        .user { color: var(--pink); font-weight: 700; margin-right: 5px; }
        .txt { color: #333; }
        
        /* ========================================== */
        /* CSS CHẾ ĐỘ TOÀN MÀN HÌNH ẢO CHO MOBILE */
        /* ========================================== */
        body.fullscreen-mode {
            overflow: hidden; padding: 0;
        }
        body.fullscreen-mode .container > *:not(.card-chat-area) {
            display: none !important; 
        }
        body.fullscreen-mode .container {
            max-width: 100vw; height: 100vh; gap: 0;
        }
        body.fullscreen-mode .card-chat-area {
            border: none !important; border-radius: 0 !important;
            width: 100vw !important; height: 100vh !important;
            padding: 12px !important; display: flex; flex-direction: column;
        }
        body.fullscreen-mode .chat-box {
            flex: 1 !important; height: auto !important; max-height: none !important;
            border-radius: 10px !important; margin-bottom: 5px;
        }
        body.fullscreen-mode .btn-action { display: none; }
        body.fullscreen-mode .btn-close-full { display: block; }
        /* ========================================== */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Khung Đồng hồ -->
        <div class="clock-card">
            <div id="digitalClock">00:00:00</div>
            <div id="digitalDate">Thứ ..., Ngày --/--/----</div>
        </div>

        <!-- Khung Điều khiển chính (Bật/Tắt đồng bộ VPS) -->
        <div class="card">
            <!-- ĐÃ MỞ KHÓA Ô NHẬP ID ĐỂ THAY ĐỔI ĐỘNG -->
            <input type="text" id="username" value="chipham1" placeholder="Nhập tên tài khoản TikTok Live">
            <button class="btn-main" id="btnConnect">BẮT ĐẦU ĐỌC CMT</button>
            <span class="status-text" id="status">○ Hệ thống đang tạm nghỉ. Nhập ID và bấm nút để kết nối.</span>
        </div>

        <!-- Khung Vùng hiển thị nội dung Chat sống -->
        <div class="card card-chat-area" style="padding: 12px;">
            <div class="chat-header">
                <h3 class="chat-title">💬 BÌNH LUẬN TRỰC TIẾP</h3>
                <button id="btnFullscreen" class="btn-action">📺 TOÀN MÀN HÌNH</button>
                <button id="btnCloseFullscreen" class="btn-close-full">❌ THOÁT TOÀN MÀN HÌNH</button>
            </div>
            
            <div class="font-control">
                <label for="fontSizeSlider">Cỡ chữ: <span id="fontSizeVal">16</span>px</label>
                <input type="range" id="fontSizeSlider" min="14" max="28" value="16">
            </div>

            <div class="chat-box-wrapper">
                <div class="chat-box" id="chatBox"></div>
            </div>
        </div>
    </div>

    <script>
        // ĐƯỜNG DẪN ĐỊNH DANH VPS (ĐÚNG CỔNG 3001)
        const VPS_IP = "http://34.126.191.224:3001";

        let socket = null;
        const btnConnect = document.getElementById('btnConnect');
        const usernameInput = document.getElementById('username');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeVal = document.getElementById('fontSizeVal');
        const btnFullscreen = document.getElementById('btnFullscreen');
        const btnCloseFullscreen = document.getElementById('btnCloseFullscreen');
        
        let currentFontSize = 16;
        let wakeLock = null;

        // 1. Logic Đồng hồ tự động cập nhật[cite: 2]
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digitalClock').innerText = `${hours}:${minutes}:${seconds}`;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const dayName = days[now.getDay()];
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('digitalDate').innerText = `${dayName}, Ngày ${day}/${month}/${year}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Thanh trượt điều chỉnh kích thước chữ[cite: 2]
        fontSizeSlider.oninput = (e) => {
            currentFontSize = e.target.value;
            fontSizeVal.innerText = currentFontSize;
            
            const messages = chatBox.getElementsByClassName('msg');
            for(let msg of messages) {
                msg.style.fontSize = currentFontSize + 'px';
            }
        };

        // 3. Giữ màn hình luôn sáng chủ động (Wake Lock API)[cite: 2]
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Màn hình đang được giữ sáng chủ động...');
                } catch (err) {
                    console.warn(`WakeLock lỗi: ${err.message}`);
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // 4. Xử lý chế độ Toàn màn hình ảo (Virtual Fullscreen) chuẩn Mobile[cite: 2]
        btnFullscreen.onclick = () => {
            document.body.classList.add('fullscreen-mode');
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        btnCloseFullscreen.onclick = () => {
            document.body.classList.remove('fullscreen-mode');
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        // Hàm đặt lại trạng thái UI nguyên bản khi đóng kết nối
        function resetUI() {
            btnConnect.innerText = "BẮT ĐẦU ĐỌC CMT";
            btnConnect.className = "btn-main"; 
            usernameInput.disabled = false; // Mở khóa ô nhập để điền ID khác
            statusText.innerText = "○ Đã ngắt kết nối an toàn với VPS. Luồng cào dừng hoàn toàn.";
            statusText.style.color = "#ffa502";
        }

        // 5. Logic Xử lý sự kiện On/Off chính (Liên kết chặt chẽ bảo vệ IP VPS)
        btnConnect.onclick = async () => {
            if (!socket || !socket.connected) {
                const targetUser = usernameInput.value.trim();
                if (!targetUser) {
                    alert("Vui lòng nhập ID TikTok cần xem live!");
                    return;
                }

                // HÀNH ĐỘNG: KÍCH HOẠT KẾT NỐI LÊN VPS
                btnConnect.innerText = "ĐANG KẾT NỐI...";
                usernameInput.disabled = true; // Khóa ô nhập tạm thời để tránh đổi ID khi đang chạy
                chatBox.innerHTML = ""; // Xóa bớt cmt cũ của phòng live trước đó cho sạch
                
                // Cấu hình chặn Auto-reconnect ngầm và GỬI KÈM ID lên thông qua query định danh
                socket = io(VPS_IP, {
                    forceNew: true,
                    reconnection: false,
                    query: { tiktokId: targetUser } // Truyền ID sang file bot.js trên VPS xử lý
                });

                socket.on('connect', async () => {
                    btnConnect.innerText = "NGẮT KẾT NỐI (ĐANG LIVE)";
                    btnConnect.className = "btn-main btn-stop-mode";
                    statusText.innerText = `● Đã kết nối thành công! Đang đợi cmt từ phòng: ${targetUser}`;
                    statusText.style.color = "#2ed573";
                    await requestWakeLock(); // Bật giữ sáng màn hình[cite: 2]
                });

                socket.on('disconnect', () => {
                    resetUI();
                });

                socket.on('connect_error', () => {
                    btnConnect.innerText = "THỬ LẠI (LỖI KẾT NỐI)";
                    btnConnect.className = "btn-main";
                    usernameInput.disabled = false;
                    statusText.innerText = "Lỗi: Không kết nối được VPS hoặc ID sai. Hãy kiểm tra lại file bot trên VPS!";
                    statusText.style.color = "#ff4757";
                    if(socket) {
                        socket.close();
                        socket = null;
                    }
                });

                // Nhận bình luận đổ về từ sự kiện gốc của file bot.js
                socket.on('new_comment', (data) => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    msgDiv.style.fontSize = currentFontSize + 'px';
                    
                    // Giao diện siêu sạch: Chỉ hiển thị Nickname và Comment
                    msgDiv.innerHTML = `<span class="user">${data.nickname}:</span><span class="txt">${data.comment}</span>`;
                    chatBox.appendChild(msgDiv);
                    
                    // Tự động cuộn khung chat bám đuôi cmt[cite: 2]
                    chatBox.scrollTop = chatBox.scrollHeight;

                    // Giới hạn lưu tối đa 50 dòng trên điện thoại để máy mượt không giật lag
                    const currentItems = chatBox.getElementsByClassName('msg');
                    if (currentItems.length > 50) {
                        currentItems[0].remove();
                    }
                });

            } else {
                // HÀNH ĐỘNG: CHỦ ĐỘNG BẤM NÚT NGẮT KẾT NỐI (Triệt tiêu luồng cào ngay lập tức)
                statusText.innerText = "Đang gửi lệnh ngắt luồng tới VPS...";
                statusText.style.color = "#ffa502";
                socket.close(); // Đóng socket tức thì
                socket = null;  // Hủy biến triệt để chặn auto reconnect
                resetUI();
            }
        };
    </script>
</body>
</html>
