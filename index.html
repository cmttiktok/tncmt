<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Comments - Chi Bánh Bèo</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20, #15102a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Giao diện Glassmorphism */
        .header-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .header-panel h1 {
            font-size: 1.3rem;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        /* Nút bấm ON/OFF tối ưu cho Mobile */
        .control-btn {
            width: 80%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .btn-start {
            background: linear-gradient(135deg, #2ed573, #26af5f);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff4757, #ff2e44);
        }

        .comment-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            height: calc(100vh - 160px); 
            min-height: 450px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .comment-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #ff007f;
            padding: 10px 12px;
            border-radius: 4px 12px 12px 4px;
            animation: fadeIn 0.2s ease forwards;
            word-wrap: break-word;
        }

        .nickname {
            color: #00d2d3;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .comment-text {
            color: #f5f6fa;
            font-size: 0.95rem;
            margin-top: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-panel">
            <h1>ROOM CHI BÁNH BÈO</h1>
            <!-- Nút bấm điều khiển kết nối -->
            <button id="toggle-btn" class="control-btn btn-start">BẮT ĐẦU ĐỌC CMT</button>
        </div>

        <div class="comment-box">
            <div id="comment-list" class="comment-list">
                <div id="status-msg" class="comment-item" style="border-left-color: #ffa502;">
                    <div class="comment-text" style="color: #ffa502;">Hệ thống đang tạm nghỉ. Nhấn nút phía trên khi idol lên Live nhé!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KIỂM TRA: Điền đúng IP và cổng (3000 hoặc 3001) bạn đang chạy trên VPS
        const VPS_IP = "http://34.126.191.224:3000"; 
        
        let socket = null;
        const toggleBtn = document.getElementById('toggle-btn');
        const commentList = document.getElementById('comment-list');
        const statusMsg = document.getElementById('status-msg');

        toggleBtn.addEventListener('click', () => {
            if (!socket || !socket.connected) {
                // HÀNH ĐỘNG: BẬT KẾT NỐI
                toggleBtn.innerText = "ĐANG KẾT NỐI...";
                
                socket = io(VPS_IP, { forceNew: true });

                socket.on('connect', () => {
                    toggleBtn.innerText = "NGẮT KẾT NỐI (ĐANG LIVE)";
                    toggleBtn.className = "control-btn btn-stop";
                    statusMsg.innerHTML = `<div class="comment-text" style="color: #2ed573;">● Đã kết nối thành công với VPS! Đang đợi cmt...</div>`;
                });

                socket.on('disconnect', () => {
                    resetUI();
                });

                socket.on('connect_error', () => {
                    toggleBtn.innerText = "THỬ LẠI (LỖI KẾT NỐI)";
                    toggleBtn.className = "control-btn btn-start";
                    statusMsg.innerHTML = `<div class="comment-text" style="color: #ff4757;">Lỗi: Không thể kết nối tới VPS. Hãy kiểm tra lại port hoặc cài đặt trình duyệt!</div>`;
                });

                // Nhận bình luận mới
                socket.on('new_comment', (data) => {
                    const commentItem = document.createElement('div');
                    commentItem.className = 'comment-item';
                    commentItem.innerHTML = `
                        <div class="nickname">${data.nickname} <span style="color:rgba(255,255,255,0.3); font-size:0.8rem;">@${data.username}</span></div>
                        <div class="comment-text">${data.comment}</div>
                    `;
                    commentList.appendChild(commentItem);
                    commentList.scrollTop = commentList.scrollHeight;

                    // Giới hạn 40 dòng trên mobile cho nhẹ máy
                    const currentItems = commentList.getElementsByClassName('comment-item');
                    if (currentItems.length > 40) currentItems[0].remove();
                });

            } else {
                // HÀNH ĐỘNG: TẮT KẾT NỐI
                socket.disconnect();
                resetUI();
            }
        });

        function resetUI() {
            toggleBtn.innerText = "BẮT ĐẦU ĐỌC CMT";
            toggleBtn.className = "control-btn btn-start";
            statusMsg.innerHTML = `<div class="comment-text" style="color: #ffa502;">Đã ngắt kết nối an toàn. VPS đã dừng quét phòng Live.</div>`;
        }
    </script>
</body>
</html>
